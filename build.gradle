tasks.register("modrinth") {
	dependsOn(
			subprojects.collect {
				it.tasks.find { it.name == "modrinth" }
			}.findAll { it != null }
	)
}

tasks.register("modrinthSyncBody") {
	dependsOn(
			subprojects.collect {
				it.tasks.find { it.name == "modrinthSyncBody" }
			}.find { it != null }
	)
}
